<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.K Perfumes</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="icon" href="../favicon_io/favicon.ico">
    <link rel="manifest" href="../favicon/site.webmanifest">

    <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body>
    <div id="main">
        <!-- Header -->
        <div id="header">
            <div id="full-navbar">
                <div id="navbarlink">
                    <a href="./index.html">Home</a>
                    <a href="./product.html">Buy Products</a>
                    <a href="./cart.html">Contact Us</a>
                    <button id="navbarbtn"><a href="./login.html">Login</a></button>
                </div>
            </div>

            <nav>
                <div id="logo">
                    <img src="../images/logo.png" alt="Logo">
                </div>

                <div id="link">
                    <a href="./index.html">Home</a>
                    <a href="./product.html">Buy Products</a>
                    <a href="./cart.html">Contact Us</a>
                </div>

                <div id="SignUp">
                    <button id="btn"><a href="./login.html">Login</a></button>
                    <i class="ri-search-line"></i>

        <div id="addToCart">

            </div>

                <div id="overlay">

                        <button><a href="./product.html">Shop Now</a></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product Section -->
        <div id="products">
            <div id="container">
                <h1 id="heading">Categories</h1>
                <div id="categories">
                    <div id="product-grid" class="product-grid"></div>
                </div>
            </div>
        </div>

        <!-- JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
        <script src="../Javascripts/main.js"></script>

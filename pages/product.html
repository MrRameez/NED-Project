<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="icon" href="../favicon_io/favicon.ico">
    <link rel="manifest" href="../favicon/site.webmanifest">
    <link rel="stylesheet" href="../CSS/product.css">
    <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body>
    <div id="main">
        <!-- ------------Header---------------- -->
        <div id="header">
            <div id="full-navbar">
                <div id="navbarlink">
                    <a href="./index.html">Home</a>
                    <a href="./product.html">Buy Products</a>
                    <a href="./cart.html">Contact Us</a>
                    <button id="navbarbtn"><a href="./login.html">Login</a></button>
                </div>

            </div>
            <nav>
                <div id="logo">
                    <img src="../images/logo.png" alt="Logo">
                </div>

                <div id="link">
                    <a href="./index.html">Home</a>
                    <a href="./product.html">Buy Products</a>
                    <a href="./cart.html">Contact Us</a>
                </div>
                <div id="SignUp">
                    <button id="btn"><a href="./login.html">Login</a></button>
                    <i class="ri-search-line"></i>
                    <i id="shoppingcart" class="ri-shopping-bag-fill"></i>
                    <i id="menu" class="ri-menu-line"></i>
                </div>
            </nav>
        </div>






        <!-- ========Add to Cart Design=========== -->

        <div id="addToCart">
            <div id="container"></div>
        </div>




        <div id="filterCarts">
            <input type="text" id="productName" placeholder="Enter product name">
            <select id="gender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <button onclick="filterProducts()">Filter</button>
        </div>
        <div id="buyproduct">
            <div id="productContainer"></div>
        </div>


        <!-- JS File -->


        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
        <script src="../Javascripts/main.js"></script>


</body>

</html>
